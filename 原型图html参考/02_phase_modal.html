<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FastFlow - 02 Phase Modal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#ec5b13",
          "background-dark": "#0F0F0F",
          "card-dark": "#1C1C1E",
        },
        fontFamily: { "display": ["Public Sans", "sans-serif"] },
      },
    },
  }
</script>
<style>
  body { font-family: 'Public Sans', sans-serif; -webkit-font-smoothing: antialiased; min-height: max(884px, 100dvh); }
  .progress-ring-circle { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
</style>
</head>
<body class="dark bg-background-dark text-slate-100 min-h-screen flex flex-col">

<!-- Background: Timer screen (dimmed) -->
<nav class="flex items-center justify-between px-6 py-4 bg-background-dark sticky top-0 z-10 opacity-40">
  <div class="flex items-center gap-2">
    <div class="bg-primary p-1.5 rounded-lg"><span class="material-symbols-outlined text-white text-2xl">bolt</span></div>
    <h1 class="text-xl font-bold">FastFlow</h1>
  </div>
  <span class="material-symbols-outlined">settings</span>
</nav>
<main class="flex-1 flex flex-col items-center px-6 pt-8 pb-32 max-w-md mx-auto w-full opacity-40 pointer-events-none">
  <div class="relative flex items-center justify-center mb-12">
    <svg class="w-72 h-72">
      <circle class="text-slate-800" cx="144" cy="144" fill="transparent" r="128" stroke="currentColor" stroke-width="16"></circle>
      <circle class="progress-ring-circle" cx="144" cy="144" fill="transparent" r="128" stroke="url(#g2)" stroke-dasharray="804" stroke-dashoffset="200" stroke-linecap="round" stroke-width="16"></circle>
      <defs><linearGradient id="g2" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" style="stop-color:#ec5b13"/><stop offset="100%" style="stop-color:#ff8c42"/></linearGradient></defs>
    </svg>
    <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
      <span class="text-3xl mb-1">🔥</span>
      <span class="text-xs uppercase tracking-widest font-semibold text-slate-400">Fat Burning</span>
      <div class="text-5xl font-bold tracking-tight mb-2 tabular-nums mt-2">14:32:10</div>
      <div class="text-sm text-slate-500">1h 28m remaining</div>
    </div>
  </div>
</main>

<!-- Dark Overlay -->
<div class="fixed inset-0 bg-black/60 z-50"></div>

<!-- Bottom Sheet Modal -->
<div class="fixed bottom-0 left-0 right-0 z-[60] flex items-end">
  <div class="w-full max-w-md mx-auto bg-card-dark rounded-t-[32px] p-6 pb-12" style="height: 55dvh;">
    <!-- Drag Handle -->
    <div class="flex justify-center mb-8">
      <div class="w-12 h-1.5 bg-slate-600 rounded-full"></div>
    </div>
    <!-- Content -->
    <div class="flex flex-col items-center text-center space-y-4">
      <div class="text-5xl mb-2">🔥</div>
      <div>
        <h2 class="text-2xl font-bold text-white">Fat Burning Mode</h2>
        <p class="text-primary font-semibold mt-1">12–16 hours</p>
      </div>
      <!-- ✅ Compliant description: state only, no benefit claims -->
      <p class="text-slate-400 leading-relaxed px-4">
        Your body has shifted away from glucose and is drawing on stored fat reserves as its primary fuel source.
      </p>
      <div class="w-full pt-6 flex flex-col gap-4">
        <a href="01_timer.html">
          <button class="w-full py-4 bg-primary text-white font-bold rounded-2xl shadow-lg shadow-primary/20">Keep Going!</button>
        </a>
        <button class="text-sm font-medium text-slate-500 hover:text-slate-300">View all phases</button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
